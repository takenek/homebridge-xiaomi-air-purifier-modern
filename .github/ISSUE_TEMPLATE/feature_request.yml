name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for the suggestion!

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: Describe the problem this feature would solve, or the use case it enables.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you've considered.

  - type: input
    id: device-model
    attributes:
      label: Device model (if applicable)
      placeholder: "e.g. zhimi.airpurifier.3h"
