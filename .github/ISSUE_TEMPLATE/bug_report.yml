name: Bug report
description: Report a reproducible bug
body:
  - type: input
    id: plugin_version
    attributes: {label: Plugin version}
    validations: {required: true}
  - type: input
    id: homebridge
    attributes: {label: Homebridge version}
    validations: {required: true}
  - type: input
    id: node
    attributes: {label: Node.js version}
    validations: {required: true}
  - type: textarea
    id: steps
    attributes: {label: Steps to reproduce}
    validations: {required: true}
