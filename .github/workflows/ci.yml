name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - node: 22
            homebridge: "1.11.2"
            lane: full
          - node: 24
            homebridge: "1.11.2"
            lane: full
          - node: 22
            homebridge: "beta"
            lane: full
          - node: 24
            homebridge: "beta"
            lane: smoke
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: env -u npm_config_http_proxy -u npm_config_https_proxy npm ci
      - run: env -u npm_config_http_proxy -u npm_config_https_proxy npm install --no-save homebridge@${{ matrix.homebridge }}
      - run: env -u npm_config_http_proxy -u npm_config_https_proxy npm run lint
      - run: env -u npm_config_http_proxy -u npm_config_https_proxy npm run typecheck
      - run: env -u npm_config_http_proxy -u npm_config_https_proxy npm test
      - name: Upload coverage
        if: always() && matrix.lane == 'full'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-node-${{ matrix.node }}-hb-${{ matrix.homebridge }}-lane-${{ matrix.lane }}
          path: coverage

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: env -u npm_config_http_proxy -u npm_config_https_proxy npm ci
      - run: env -u npm_config_http_proxy -u npm_config_https_proxy npm audit --audit-level=high
