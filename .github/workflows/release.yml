name: Release

on:
  push:
    branches: [main]

# A-02: no workflow-wide permissions. Each job requests only what it needs
# (least privilege). The privileged OIDC/write token exists solely in `publish`.
permissions: {}

jobs:
  # A-02: read-only verification gate. Runs the full check matrix (Node 22 + 24)
  # for the exact commit being released, decoupled from the privileged publish
  # step. `publish` depends on this, so a commit that fails lint/typecheck/test/
  # build/audit on any supported Node version is never published.
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # A-02: do not persist the checkout token in .git/config; nothing in
          # this job needs to push, and code runs (npm run check) before publish.
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run check

  # A-02: minimal publish job. It only gains the write/OIDC scopes after `verify`
  # succeeds on every matrix cell. semantic-release core is resolved by the
  # pinned action; the plugin tree is pinned to exact versions below.
  publish:
    needs: [verify]
    runs-on: ubuntu-latest
    # A-02: attach a protected GitHub Environment. Configure required reviewers /
    # required status checks (CI, Supply Chain) on the `release` environment in
    # repository settings so publication is additionally gated by branch
    # protection outcomes for the same commit.
    environment: release
    permissions:
      # semantic-release: create tags, releases and the changelog commit.
      contents: write
      # @semantic-release/github: comment on issues/PRs.
      issues: write
      pull-requests: write
      # npm Trusted Publishing via OIDC.
      id-token: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          # A-02: semantic-release authenticates via GITHUB_TOKEN below; it does
          # not use the checkout-persisted credential.
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - run: npm ci

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          # NOTE (A-02 residual): pinned to a major range because the action
          # resolves semantic-release core at run time. Fully deterministic
          # release tooling (exact-pinned core + locked plugin tree, or an
          # immutable release image) is an operator follow-up — see
          # STAGE_5_REMEDIATION_IMPLEMENTATION.md. Plugins below are exact-pinned.
          semantic_version: 25
          extra_plugins: |
            @semantic-release/changelog@6.0.3
            @semantic-release/git@10.0.1
            @semantic-release/npm@13.1.5
            @semantic-release/github@11.0.4
            @semantic-release/commit-analyzer@13.0.1
            @semantic-release/release-notes-generator@14.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
