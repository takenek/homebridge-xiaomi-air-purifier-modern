name: Release

on:
  push:
    branches: [main]

permissions:
  # Potrzebne semantic-release do tworzenia tagów, release i commitów changeloga.
  contents: write

  # Potrzebne @semantic-release/github do komentowania issue/PR.
  issues: write
  pull-requests: write

  # Potrzebne npm Trusted Publishing przez OIDC.
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - run: npm ci

      - run: npm audit --audit-level=high

      - run: npm run check

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          semantic_version: 25
          extra_plugins: |
            @semantic-release/changelog@6.0.3
            @semantic-release/git@10.0.1
            @semantic-release/npm@13.1.5
            @semantic-release/github@11.0.4
            @semantic-release/commit-analyzer@13.0.1
            @semantic-release/release-notes-generator@14.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
