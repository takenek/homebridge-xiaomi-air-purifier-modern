name: Supply Chain

on:
  push:
    branches: [main, work]
  pull_request:

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: env -u npm_config_http_proxy -u npm_config_https_proxy npm ci
      - run: env -u npm_config_http_proxy -u npm_config_https_proxy npm sbom --omit dev --sbom-format cyclonedx > sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json

  osv-scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: env -u npm_config_http_proxy -u npm_config_https_proxy npm ci
      - uses: google/osv-scanner-action/osv-scanner-action@v2
        with:
          scan-args: |-
            --lockfile=package-lock.json
